name: HexEditorUITests
options:
  bundleIdPrefix: org.notepadplusplus.hexeditor
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    # Sign the runner with a stable self-signed identity instead of the
    # default ad-hoc signing ("-"). macOS TCC keys Accessibility grants by
    # the binary's designated requirement; ad-hoc signing puts the SHA-256
    # hash of the binary in the DR, so any rebuild — even comment-only —
    # invalidates the previous TCC grant and the next test run fails with
    # "Timed out while enabling automation mode". Signing with a stable
    # cert puts the cert's identity in the DR instead, so the grant
    # survives any rebuild. Each developer runs
    #   macos/scripts/install-test-codesign-cert.sh
    # once per machine that builds the runner (the VM, in our standard
    # workflow) to install this cert into their login keychain. Manual
    # style + empty DEVELOPMENT_TEAM because there is no team — the cert
    # is local-only.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "NPP-HexEdit Test Codesign"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    DEVELOPMENT_TEAM: ""

targets:
  HexEditorUITestRunner:
    type: application
    platform: macOS
    sources:
      - path: TestRunner
    info:
      path: TestRunner/Info.plist
      properties:
        CFBundleName: HexEditorUITestRunner
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.notepadplusplus.hexeditor.uitestrunner
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  HexEditorUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: HexEditorUITestRunner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.notepadplusplus.hexeditor.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: HexEditorUITestRunner

schemes:
  HexEditorUITests:
    build:
      targets:
        HexEditorUITestRunner: all
        HexEditorUITests: [test]
    test:
      targets:
        - HexEditorUITests
      gatherCoverageData: false
